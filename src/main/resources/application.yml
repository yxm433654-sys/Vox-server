# ============================================
# Spring Boot 搴旂敤閰嶇疆
# ============================================

spring:
  application:
    name: vox-server

  # 鏁版嵁婧愰厤缃?  datasource:
    url: jdbc:mysql://127.0.0.1:3306/chatdb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: chatuser
    password: chatpass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA閰嶇疆
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # 鏂囦欢涓婁紶閰嶇疆
  servlet:
    multipart:
      enabled: true
      max-file-size: 256MB
      max-request-size: 256MB
      file-size-threshold: 2KB


# 鏈嶅姟鍣ㄩ厤缃?server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain

# MinIO閰嶇疆
minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: chat-app
  # 棰勭鍚峌RL杩囨湡鏃堕棿(绉?
  presigned-url-expiry: 3600

# FFmpeg閰嶇疆
ffmpeg:
  path: ffmpeg
  timeout: 300
  # 杞爜鍙傛暟
  codec:
    video: libx264
    audio: aac
  # 涓轰簡闄嶄綆杞爜瀵艰嚧鐨勪笂浼?鍙戦€侀樆濉烇紝浣跨敤鏇村揩鐨勭紪鐮侀璁?  preset: veryfast
  crf: 23
  audio-bitrate: 128k
  pixel-format: yuv420p

# 搴旂敤閰嶇疆
app:
  # 鏀寔鐨勬枃浠剁被鍨?  upload:
    allowed-image-types:
      - image/jpeg
      - image/jpg
      - image/png
      - image/heic
    allowed-video-types:
      - video/quicktime
      - video/mp4
      - video/mov
    max-image-size: 20971520  # 20MB
    max-video-size: 268435456 # 256MB
  
  # 涓存椂鏂囦欢鐩綍
  temp-dir: tmp/chat-uploads
  
  # 鍔ㄦ€佸浘鐗囧鐞?  dynamic-photo:
    # 鏄惁鑷姩杞爜
    auto-transcode: true
    # 灏侀潰鎻愬彇鏃堕棿鐐?绉?
    cover-time: 0.5
    # 淇濈暀鍘熷鏂囦欢
    keep-original: false

  jwt:
    secret: dev-secret-change-me-please-set-env
    expiry-seconds: 86400

# 鏃ュ織閰嶇疆
logging:
  level:
    root: INFO
    com.vox: DEBUG
    com.chatapp: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30

# Actuator鐩戞帶绔偣
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

