# ============================================
# Spring Boot 应用配置
# ============================================

spring:
  application:
    name: dynamic-photo-chat

  # 数据源配置
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/chatdb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: chatuser
    password: chatpass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 2KB


# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain

# MinIO配置
minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: chat-app
  # 预签名URL过期时间(秒)
  presigned-url-expiry: 3600

# FFmpeg配置
ffmpeg:
  path: ffmpeg
  timeout: 300
  # 转码参数
  codec:
    video: libx264
    audio: aac
  # 为了降低转码导致的上传/发送阻塞，使用更快的编码预设
  preset: veryfast
  crf: 23
  audio-bitrate: 128k
  pixel-format: yuv420p

# 应用配置
app:
  # 支持的文件类型
  upload:
    allowed-image-types:
      - image/jpeg
      - image/jpg
      - image/png
      - image/heic
    allowed-video-types:
      - video/quicktime
      - video/mp4
      - video/mov
    max-image-size: 20971520  # 20MB
    max-video-size: 104857600 # 100MB
  
  # 临时文件目录
  temp-dir: tmp/chat-uploads
  
  # 动态图片处理
  dynamic-photo:
    # 是否自动转码
    auto-transcode: true
    # 封面提取时间点(秒)
    cover-time: 0.5
    # 保留原始文件
    keep-original: false

  jwt:
    secret: dev-secret-change-me-please-set-env
    expiry-seconds: 86400

# 日志配置
logging:
  level:
    root: INFO
    com.chatapp: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30

# Actuator监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
