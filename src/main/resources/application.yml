spring:
  application:
    name: vox-server

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/chatdb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: chatuser
    password: chatpass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 256MB
      max-request-size: 256MB
      file-size-threshold: 512KB

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: chat-app
  presigned-url-expiry: 3600

ffmpeg:
  path: ffmpeg
  timeout: 300
  codec:
    video: libx264
    audio: aac
  preset: veryfast
  crf: 23
  audio-bitrate: 128k
  pixel-format: yuv420p

app:
  upload:
    allowed-image-types:
      - image/jpeg
      - image/jpg
      - image/png
      - image/heic
    allowed-video-types:
      - video/quicktime
      - video/mp4
      - video/mov
    max-image-size: 20971520
    max-video-size: 268435456

  temp-dir: tmp/chat-uploads

  dynamic-photo:
    auto-transcode: true
    cover-time: 0.5
    keep-original: false

  jwt:
    secret: dev-secret-change-me-please-set-env
    expiry-seconds: 86400

logging:
  level:
    root: INFO
    com.vox: DEBUG
    com.chatapp: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized